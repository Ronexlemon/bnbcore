version: "3.9"

services:

  # =========================
  # POSTGRES DATABASE
  # =========================
  db:
    image: postgres:16
    container_name: bnbcore_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lemon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================
  # REDIS (CACHE / SESSIONS)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: bnbcore_redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  # =========================
  # ZOOKEEPER (KAFKA DEPENDENCY)
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bnbcore_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeperdata:/var/lib/zookeeper/data
      - zookeeperlog:/var/lib/zookeeper/log

  # =========================
  # KAFKA EVENT QUEUE
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bnbcore_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # =========================
  # MIGRATIONS RUNNER
  # =========================
  migrate:
    image: migrate/migrate
    container_name: bnbcore_migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./internal/infrastructure/db/migrations:/migrations:ro
    command: -path=/migrations -database "postgres://postgres:postgres@db:5432/lemon?sslmode=disable" up

  # =========================
  # GO API SERVICE
  # =========================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bnbcore_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  pgdata:
  zookeeperdata:
  zookeeperlog:
  kafkadata: